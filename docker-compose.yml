services:
  postgres:
    image: postgres:16
    container_name: studymate_postgres
    environment:
      POSTGRES_DB: studymate
      POSTGRES_USER: studymate
      POSTGRES_PASSWORD: studymate
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studymate -d studymate"]
      interval: 5s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:0.5.23
    container_name: studymate_chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: ./backend
    container_name: studymate_backend
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      GEMINI_LLM_MODEL: gemini-2.5-flash
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: studymate_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
